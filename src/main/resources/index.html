<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Free Rooms</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="control">
        <div class="logos">
            <img src="logo.png" alt="" class="logo">
            <img src="smv.svg" alt="" class="smv">
        </div>
        <div class="control-ui">
            <div class="control-ui" style="height: fit-content">
                <input class="text-input" type="text" id="user" placeholder="max.mustermann">
                <input class="text-input" type="password" id="pass" placeholder="123456">
                <button onclick="main().catch(console.error);">Free Rooms</button>
            </div>
            <div>
                <input type="checkbox" id="show-all">
                <label for="show-all">Show All</label>
            </div>
            <p id="status">Enter Credentials</p>
        </div>
    </div>
    <div class="content">
        <div id="loading-bar">
            <div id="loading-bar-color"></div>
        </div>
        <table id="room-table">
            <tr>
                <th>Raum ID</th>
                <th>Raum Kürzel</th>
                <th>Langer Raumname</th>
            </tr>
        </table>
    </div>
    <script src="main.js"></script>
</body>
</html>
